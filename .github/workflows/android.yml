name: Build Automated APK to Google Drive
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Buildozer Dependencies
      run: |
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libffi-dev cmake gettext texinfo build-essential patch lld
        pip install --upgrade pip
        pip install cython==0.29.33 buildozer

    - name: Automatically Configure buildozer.spec
      run: |
        buildozer init
        sed -i 's/^requirements = .*/requirements = python3, kivy, requests, certifi/' buildozer.spec
        sed -i 's/^#\s*android.permissions =.*/android.permissions = INTERNET, READ_MEDIA_VIDEO, WRITE_EXTERNAL_STORAGE/' buildozer.spec

    - name: Build Android APK with Microsoft Cloud Server
         - name: Upload APK Directly to Google Driလို:       uses: jakejarvis/google-drive-upload-action@mast      wit         credentials: ${{ secrets.GDRIVE_CREDENTIALS          filename: bin/*.a         folderId: ${{ secrets.GDRIVE_TARGET_FOLDER }}

