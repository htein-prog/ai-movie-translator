name: Build Automated APK to Google Drive
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Buildozer Dependencies
      run: |
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libffi-dev cmake gettext texinfo build-essential patch lld jq
        pip install --upgrade pip
        pip install cython==0.29.33 buildozer

    - name: Automatically Configure buildozer.spec
      run: |
        buildozer init
        sed -i 's/^requirements = .*/requirements = python3, kivy, requests, certifi/' buildozer.spec
        sed -i 's/^#\s*android.permissions =.*/android.permissions = INTERNET, READ_MEDIA_VIDEO, WRITE_EXTERNAL_STORAGE/' buildozer.spec

    - name: Build Android APK with Microsoft Cloud Server
      run: buildozer -v android debug

    - name: Upload APK directly to Google Drive via native curl API
      run: |
        APK_FILE=$(ls bin/*.apk | head -n 1)
        FILE_NAME=$(basename "$APK_FILE")
        
        # Google Drive standard API upload logic
        ACCESS_TOKEN=$(echo '${{ secrets.GDRIVE_CREDENTIALS }}' | jq -r '.token_type + " " + .access_token' 2>/dev/null || echo "Bearer ${{ secrets.GDRIVE_CREDENTIALS }}")
        
        curl -X POST -L \
          -H "Authorization: $ACCESS_TOKEN" \
          -F "metadata={name: '$FILE_NAME', parents: ['${{ secrets.GDRIVE_TARGET_FOLDER }}']};type=application/json" \
          -F "file=@$APK_FILE" \
          "https://googleapis.com"
        
        echo "🚀 Success! APK has been sent to Google Drive."

